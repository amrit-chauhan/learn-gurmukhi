<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#DB2777" />
        <meta name="description" content="Learn the Punjabi (Gurmukhi) alphabet with flashcards, spaced repetition, and audio pronunciation." />
        <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="any" />
        <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
        <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+Gurmukhi:wght@400;500;600;700&display=swap" rel="stylesheet" />
        <title>Learn Gurmukhi</title>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root">
            <!--
              Static loading shell. This paints instantly — before the JS bundle
              downloads and React boots — so the first frame is branded content
              instead of a blank white page. React replaces the whole #root
              subtree on its first render, so nothing here needs cleanup.
              Uses system fonts only so it never waits on the web fonts.
            -->
            <div id="app-boot-shell" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:#fafaf9;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;">
                <div style="font-size:30px;font-weight:800;letter-spacing:-0.02em;color:#1c1917;">Learn Punjabi</div>
                <div style="font-size:15px;color:#78716c;font-weight:500;">Master the Gurmukhi alphabet</div>
                <div style="width:32px;height:32px;border-radius:9999px;border:3px solid #e7e5e4;border-top-color:#db2777;animation:app-boot-spin 0.7s linear infinite;"></div>
            </div>
            <style>@keyframes app-boot-spin{to{transform:rotate(360deg)}}</style>
        </div>
    </body>
</html>
